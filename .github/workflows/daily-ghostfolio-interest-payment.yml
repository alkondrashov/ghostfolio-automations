name: Revolut Daily Interest Import

on:
  schedule:
    # Runs every day at 08:00 UTC — adjust to your preference
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  post-interest:
    runs-on: ubuntu-latest

    steps:
      - name: Get today's date
        id: date
        run: echo "TODAY=$(date -u +%Y-%m-%dT00:00:00.000Z)" >> $GITHUB_OUTPUT

      - name: Authenticate with Ghostfolio
        id: auth
        run: |
          TOKEN=$(curl -s -X POST "https://ghostfol.io/api/v1/auth/anonymous" \
            -H "Content-Type: application/json" \
            -d '{"accessToken": "${{ secrets.GHOSTFOLIO_ACCESS_TOKEN }}"}' \
            | jq -r '.authToken')
          echo "TOKEN=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get account balance and calculate daily interest
        id: interest
        run: |
          BALANCE=$(curl -s "https://ghostfol.io/api/v1/account" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.TOKEN }}" \
            | jq -r '.accounts[] | select(.id == "13993c80-84eb-4d6d-b42f-778410f5d92d") | .balance')
          AMOUNT=$(python3 -c "
          balance = float('$BALANCE')
          aer = 0.0123
          daily_rate = (1 + aer) ** (1 / 365) - 1
          print(round(balance * daily_rate, 6))
          ")
          echo "AMOUNT=$AMOUNT" >> $GITHUB_OUTPUT

      - name: Post interest activity
        run: |
          curl -s -X POST "https://ghostfol.io/api/v1/import" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "activities": [
                {
                  "currency": "GBP",
                  "dataSource": "MANUAL",
                  "date": "${{ steps.date.outputs.TODAY }}",
                  "fee": 0,
                  "quantity": 1,
                  "symbol": "Interest paid",
                  "type": "INTEREST",
                  "unitPrice": ${{ steps.interest.outputs.AMOUNT }},
                  "accountId": "13993c80-84eb-4d6d-b42f-778410f5d92d",
                  "comment": ""
                }
              ]
            }'
